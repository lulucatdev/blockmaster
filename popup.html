<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlockMaster 设置</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #15202b;
      color: #e7e9ea;
    }
    
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      border-bottom: 1px solid #2f3336;
    }
    
    .header-icon {
      width: 32px;
      height: 32px;
      border-radius: 6px;
    }
    
    .header h1 {
      font-size: 16px;
      font-weight: 700;
    }
    
    .header p {
      font-size: 12px;
      color: #71767b;
      margin-top: 2px;
    }
    
    .stats {
      display: flex;
      justify-content: space-around;
      padding: 16px;
      border-bottom: 1px solid #2f3336;
    }
    
    .stat {
      text-align: center;
    }
    
    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: #f4212e;
    }
    
    .stat-label {
      font-size: 11px;
      color: #71767b;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .settings {
      padding: 16px;
    }
    
    .setting-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid #2f3336;
    }
    
    .setting-item:last-child {
      border-bottom: none;
    }
    
    .setting-label {
      font-size: 14px;
    }
    
    .setting-desc {
      font-size: 11px;
      color: #71767b;
      margin-top: 4px;
    }
    
    /* Toggle switch */
    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
      background: #2f3336;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .toggle.active {
      background: #f4212e;
    }
    
    .toggle::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 20px;
      height: 20px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    
    .toggle.active::after {
      transform: translateX(20px);
    }
    
    .footer {
      padding: 12px 16px;
      text-align: center;
      border-top: 1px solid #2f3336;
    }
    
    .footer a {
      color: #1d9bf0;
      text-decoration: none;
      font-size: 12px;
    }
    
    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon48.png" alt="BlockMaster" class="header-icon">
    <div>
      <h1>BlockMaster</h1>
      <p>一键屏蔽 X 用户</p>
    </div>
  </div>
  
  <div class="stats">
    <div class="stat">
      <div class="stat-value" id="blockedCount">0</div>
      <div class="stat-label">已屏蔽</div>
    </div>
  </div>
  
  <div class="settings">
    <div class="setting-item">
      <div>
        <div class="setting-label">确认对话框</div>
        <div class="setting-desc">屏蔽前显示确认提示</div>
      </div>
      <div class="toggle active" id="confirmToggle"></div>
    </div>
    
    <div class="setting-item">
      <div>
        <div class="setting-label">屏蔽后移除</div>
        <div class="setting-desc">屏蔽后自动隐藏该推文</div>
      </div>
      <div class="toggle active" id="removeToggle"></div>
    </div>
    
    <div class="setting-item">
      <div>
        <div class="setting-label">操作通知</div>
        <div class="setting-desc">显示屏蔽成功/失败提示</div>
      </div>
      <div class="toggle active" id="notifyToggle"></div>
    </div>
  </div>
  
  <div class="footer">
    <a href="https://github.com/yourusername/blockmaster" target="_blank">GitHub</a>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
